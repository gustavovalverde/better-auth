name: Snapshot Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Snapshot tag (used in version and npm dist-tag)'
        required: false
        default: 'snapshot'
        type: string

permissions: {}

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM || github.repository_owner }}

jobs:
  snapshot:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0

      - uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
        with:
          node-version-file: '.nvmrc'
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm

      - run: pnpm install

      - name: Version snapshot
        env:
          SNAPSHOT_TAG: ${{ inputs.tag }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm changeset version --snapshot "$SNAPSHOT_TAG"

      - name: Build
        run: pnpm build

      - name: Publish snapshot
        env:
          SNAPSHOT_TAG: ${{ inputs.tag }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm changeset publish --no-git-tag --tag "$SNAPSHOT_TAG"
