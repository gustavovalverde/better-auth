name: Auto-merge Release PRs

on:
  pull_request:
    types: [opened, synchronize]
    branches:
      - main
      - next

permissions: {}

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: startsWith(github.head_ref, 'changeset-release/')
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Enable auto-merge (squash)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: gh pr merge "$PR_NUMBER" --auto --squash --repo "$GITHUB_REPOSITORY"

      - name: Approve PR
        if: vars.RELEASE_APPROVAL_TOKEN != ''
        env:
          GH_TOKEN: ${{ secrets.RELEASE_APPROVAL_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: gh pr review "$PR_NUMBER" --approve --repo "$GITHUB_REPOSITORY"
